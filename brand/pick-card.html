<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLVALUE · Generador de Pick del día</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0e17;color:#eef2fb;font-family:'Plus Jakarta Sans',system-ui,sans-serif;padding:28px}
.wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:330px 1fr;gap:28px;align-items:start}
@media(max-width:860px){.wrap{grid-template-columns:1fr}}
h1{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:1.7rem;text-transform:uppercase;margin-bottom:4px}
.sub{color:#aab3c9;font-size:.9rem;margin-bottom:22px;line-height:1.5}
label{display:block;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:#6b7693;margin:14px 0 5px}
input,select{width:100%;background:#141a28;border:1px solid rgba(150,170,210,.18);color:#eef2fb;border-radius:9px;padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem}
input:focus,select:focus{outline:none;border-color:#f6c443}
.btn{width:100%;margin-top:20px;background:#f6c443;color:#0b0e17;border:none;border-radius:11px;padding:14px;font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:1.1rem;text-transform:uppercase;letter-spacing:.02em;cursor:pointer}
.btn:hover{filter:brightness(1.05)}
.preview{display:flex;flex-direction:column;align-items:center;gap:12px}
canvas{width:100%;max-width:540px;height:auto;border-radius:18px;border:1px solid rgba(150,170,210,.13)}
.hint{color:#6b7693;font-size:.8rem;text-align:center;max-width:540px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>Pick del día</h1>
    <p class="sub">Rellena los datos y pulsa <b>Descargar</b>. Sale una imagen 1080×1080 lista para Twitter/Instagram.</p>

    <label>Competición</label>
    <input id="comp" value="Champions League · Final">
    <div class="two">
      <div><label>Equipo local</label><input id="home" value="Real Madrid"></div>
      <div><label>Equipo visitante</label><input id="away" value="Inter"></div>
    </div>
    <label>Hora / fecha</label>
    <input id="time" value="Sáb 31 May · 21:00">

    <label>El pick (qué apostar)</label>
    <input id="pick" value="GANA REAL MADRID">
    <div class="two">
      <div><label>Cuota</label><input id="odd" value="2.10"></div>
      <div><label>Casa de apuestas</label><input id="book" value="Pinnacle"></div>
    </div>
    <div class="two">
      <div><label>Prob. modelo (%)</label><input id="model" value="52"></div>
      <div><label>Valor (%)</label><input id="value" value="+6.4"></div>
    </div>

    <button class="btn" onclick="download()">⬇ Descargar imagen</button>
  </div>

  <div class="preview">
    <canvas id="c" width="1080" height="1080"></canvas>
    <p class="hint">Vista previa en vivo. Si cambias un campo se actualiza sola. La imagen se descarga a tamaño completo (1080×1080).</p>
  </div>
</div>

<script>
const navy='#0b0e17', gold='#f6c443', golddim='#caa033', white='#eef2fb', gray='#aab3c9', green='#27d796', surf='#141a28';
const cv=document.getElementById('c'), x=cv.getContext('2d');
const $=id=>document.getElementById(id);

function rr(c,X,Y,w,h,r){c.beginPath();c.moveTo(X+r,Y);c.arcTo(X+w,Y,X+w,Y+h,r);c.arcTo(X+w,Y+h,X,Y+h,r);c.arcTo(X,Y+h,X,Y,r);c.arcTo(X,Y,X+w,Y,r);c.closePath();}
function ball(c,cx,cy,R,col){c.save();c.strokeStyle=col;c.fillStyle=col;c.lineWidth=Math.max(2,R*0.085);c.lineCap='round';c.lineJoin='round';c.beginPath();c.arc(cx,cy,R,0,7);c.stroke();const rp=R*0.4,v=[];for(let i=0;i<5;i++){const a=(-90+i*72)*Math.PI/180;v.push([cx+rp*Math.cos(a),cy+rp*Math.sin(a)]);}c.beginPath();v.forEach((p,i)=>i?c.lineTo(p[0],p[1]):c.moveTo(p[0],p[1]));c.closePath();c.fill();for(let i=0;i<5;i++){const a=(-90+i*72)*Math.PI/180;c.beginPath();c.moveTo(v[i][0],v[i][1]);c.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));c.stroke();}c.restore();}
function fit(c,t,maxW,start,fam){let s=start;do{c.font='900 '+s+'px '+fam;if(c.measureText(t).width<=maxW)break;s-=4;}while(s>26);return s;}

function draw(){
  x.fillStyle=navy;x.fillRect(0,0,1080,1080);
  // glow
  let g=x.createRadialGradient(820,40,0,820,40,760);g.addColorStop(0,'rgba(246,196,67,0.16)');g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,1080,1080);
  // pitch motif bottom-right
  x.save();x.globalAlpha=0.06;x.strokeStyle=gold;x.lineWidth=3;x.beginPath();x.arc(980,1000,180,0,7);x.stroke();x.beginPath();x.moveTo(1060,820);x.lineTo(1060,1080);x.stroke();x.restore();
  // header
  const S=70;rr(x,70,64,S,S,18);x.fillStyle=gold;x.fill();ball(x,70+S/2,64+S/2,S*0.34,navy);
  x.textBaseline='middle';x.textAlign='left';
  x.font='900 46px "Big Shoulders Display"';x.fillStyle=white;x.fillText('GOL',158,103);
  const wg=x.measureText('GOL').width;x.fillStyle=gold;x.fillText('VALUE',158+wg,103);
  // pick del dia pill
  x.textAlign='right';x.font='700 22px "Space Mono"';x.fillStyle=golddim;x.fillText('PICK DEL DÍA', 1010, 100);

  // competition
  x.textAlign='center';x.font='700 26px "Space Mono"';x.fillStyle=gold;
  x.fillText(($('comp').value||'').toUpperCase(), 540, 250);

  // matchup
  const match=($('home').value||'')+'  vs  '+($('away').value||'');
  const ms=fit(x,match.toUpperCase(),940,76,'"Big Shoulders Display"');
  x.font='900 '+ms+'px "Big Shoulders Display"';x.fillStyle=white;x.fillText(match.toUpperCase(),540,340);
  // time
  x.font='400 24px "Space Mono"';x.fillStyle=gray;x.fillText($('time').value||'',540,400);

  // pick box
  const bx=120,by=470,bw=840,bh=300;
  x.save();x.shadowColor='rgba(246,196,67,0.25)';x.shadowBlur=40;rr(x,bx,by,bw,bh,26);x.fillStyle='rgba(246,196,67,0.07)';x.fill();x.restore();
  rr(x,bx,by,bw,bh,26);x.lineWidth=2;x.strokeStyle='rgba(246,196,67,0.5)';x.stroke();
  x.textAlign='center';
  x.font='700 22px "Space Mono"';x.fillStyle=golddim;x.fillText('NUESTRO PICK',540,by+50);
  const ps=fit(x,($('pick').value||'').toUpperCase(),760,68,'"Big Shoulders Display"');
  x.font='900 '+ps+'px "Big Shoulders Display"';x.fillStyle=white;x.fillText(($('pick').value||'').toUpperCase(),540,by+120);
  // odds
  x.font='400 20px "Space Mono"';x.fillStyle=gray;x.fillText('CUOTA',540,by+185);
  x.font='900 92px "Big Shoulders Display"';x.fillStyle=gold;x.fillText(($('odd').value||''),540,by+245);

  // stats row
  const sy=850;
  function stat(cx,lbl,val,col){x.font='400 22px "Space Mono"';x.fillStyle=gray;x.textAlign='center';x.fillText(lbl,cx,sy);x.font='900 50px "Big Shoulders Display"';x.fillStyle=col;x.fillText(val,cx,sy+54);}
  stat(270,'MODELO',($('model').value||'')+'%',white);
  stat(540,'VALOR',($('value').value||''),green);
  // best book (text may be long → smaller)
  x.font='400 22px "Space Mono"';x.fillStyle=gray;x.fillText('MEJOR CASA',810,sy);
  const bs=fit(x,($('book').value||'').toUpperCase(),260,50,'"Big Shoulders Display"');
  x.font='900 '+bs+'px "Big Shoulders Display"';x.fillStyle=gold;x.fillText(($('book').value||'').toUpperCase(),810,sy+54);

  // footer
  x.font='700 30px "Space Mono"';x.fillStyle=gold;x.fillText('golvalue.online',540,1005);
  x.font='400 20px "Space Mono"';x.fillStyle='#6b7693';x.fillText('+18 · Juego responsable · No es consejo financiero',540,1045);
}

function download(){
  draw();
  cv.toBlob(b=>{const a=document.createElement('a');a.download='golvalue-pick.png';a.href=URL.createObjectURL(b);a.click();},'image/png');
}

['comp','home','away','time','pick','odd','book','model','value'].forEach(id=>$(id).addEventListener('input',draw));
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(draw);} 
draw(); setTimeout(draw,400);
</script>
</body>
</html>
