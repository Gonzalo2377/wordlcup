name: Midday scores refresh

# Refresco ligero de mediodía: SOLO liquida picks/combis/surebets terminados.
# No pide cuotas nuevas → gasta muy pocos créditos. Complementa al robot de la mañana.

on:
  schedule:
    - cron: '15 14 * * *'   # 14:15 UTC (~16:15 Madrid)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Liquidar resultados
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_MODE: scores
          ODDS_REGIONS: eu
        run: node robot/fetch-daily.js
      - name: Commit si hay cambios
        run: |
          git config user.name  "mundial-value-bot"
          git config user.email "bot@users.noreply.github.com"
          git add daily.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: midday scores refresh"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push rechazado, reintento $i…"; sleep 3
            done
          fi
