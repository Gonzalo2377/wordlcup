name: Daily odds robot

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generar daily.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_SPORT: upcoming
          ODDS_REGIONS: eu
        run: node robot/fetch-daily.js
      - name: Commit si hay cambios
        run: |
          git config user.name  "golvalue-bot"
          git config user.email "bot@users.noreply.github.com"
          git add daily.json
          if git diff --staged --quiet; then echo "Sin cambios."; else git commit -m "chore: refresh daily odds" && git push; fi
